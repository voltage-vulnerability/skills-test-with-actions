name: My manual automation script

on:
 pull_request:
   branches:
     - main

jobs:
  build-check:
   runs-on:
     - ubuntu-latest
   steps:
     - name: verify git status
       run: |
         git status
         git branch
         date
         echo "Finished checking git status!"
     - name: display workspace path
       run: pwd && hostname && user
        
   
